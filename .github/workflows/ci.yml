name: ci

on:
  push:
    tags-ignore:
      - '**'
    paths-ignore:
      - 'LICENSE'
      - '**.md'
  pull_request:
    paths-ignore:
      - 'LICENSE'
      - '**.md'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  LLVM_REPO: https://github.com/llvm/llvm-project.git
  GOFRONTEND_REPO: https://go.googlesource.com/gofrontend
  LIBFFI_REPO: https://github.com/libffi/libffi.git
  LIBBACKTRACE_REPO: https://github.com/ianlancetaylor/libbacktrace.git
  WORKAREA: ${{ github.workspace }}/workarea
  REPO_DIR: ${{ github.workspace }}/repo

jobs:
  build:
    name: build-linux-toolchain
    runs-on: ubuntu-24.04
    timeout-minutes: 360
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          path: repo

      - name: Install dependencies
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            autoconf \
            automake \
            bison \
            build-essential \
            cmake \
            flex \
            git \
            libtool \
            libxml2-dev \
            libzstd-dev \
            lld \
            m4 \
            ninja-build \
            pkg-config \
            python3 \
            rsync \
            zlib1g-dev

      - name: Prepare source tree
        env:
          LLVM_SRC_DIR: ${{ env.WORKAREA }}/llvm-project
          GOLLVM_SRC_DIR: ${{ env.WORKAREA }}/llvm-project/llvm/tools/gollvm
        run: |
          set -euxo pipefail
          mkdir -p "${WORKAREA}"
          git clone --depth 1 "${LLVM_REPO}" "${LLVM_SRC_DIR}"
          mkdir -p "${GOLLVM_SRC_DIR}"
          rsync -a --delete --exclude '.git' "${REPO_DIR}/" "${GOLLVM_SRC_DIR}/"
          git clone --depth 1 "${GOFRONTEND_REPO}" "${GOLLVM_SRC_DIR}/gofrontend"
          git clone --depth 1 "${LIBFFI_REPO}" "${GOLLVM_SRC_DIR}/libgo/libffi"
          git clone --depth 1 "${LIBBACKTRACE_REPO}" "${GOLLVM_SRC_DIR}/libgo/libbacktrace"

      - name: Configure
        env:
          LLVM_SRC_DIR: ${{ env.WORKAREA }}/llvm-project
          BUILD_DIR: ${{ env.WORKAREA }}/build-release
          INSTALL_DIR: ${{ env.WORKAREA }}/install
        run: |
          set -euxo pipefail
          cmake -S "${LLVM_SRC_DIR}/llvm" -B "${BUILD_DIR}" -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX="${INSTALL_DIR}" \
            -DLLVM_BUILD_BENCHMARKS=OFF \
            -DLLVM_BUILD_DOCS=OFF \
            -DLLVM_BUILD_EXAMPLES=OFF \
            -DLLVM_BUILD_TESTS=OFF \
            -DLLVM_ENABLE_ASSERTIONS=OFF \
            -DLLVM_INCLUDE_BENCHMARKS=OFF \
            -DLLVM_INCLUDE_DOCS=OFF \
            -DLLVM_INCLUDE_EXAMPLES=OFF \
            -DLLVM_INCLUDE_TESTS=OFF \
            -DLLVM_TARGETS_TO_BUILD=X86 \
            -DLLVM_USE_LINKER=lld \
            -DGOLLVM_DEFAULT_LINKER=lld

      - name: Build gollvm
        env:
          BUILD_DIR: ${{ env.WORKAREA }}/build-release
        run: |
          set -euxo pipefail
          cmake --build "${BUILD_DIR}" --target gollvm --parallel "$(nproc)"

      - name: Install gollvm
        env:
          BUILD_DIR: ${{ env.WORKAREA }}/build-release
        run: |
          set -euxo pipefail
          cmake --build "${BUILD_DIR}" --target install-gollvm --parallel "$(nproc)"

      - name: Archive toolchain
        env:
          INSTALL_DIR: ${{ env.WORKAREA }}/install
        run: |
          set -euxo pipefail
          tar -C "${INSTALL_DIR}" -caf "${GITHUB_WORKSPACE}/gollvm-toolchain-linux-x86_64.tar.xz" .

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: gollvm-toolchain-linux-x86_64
          path: ${{ github.workspace }}/gollvm-toolchain-linux-x86_64.tar.xz
          if-no-files-found: error
